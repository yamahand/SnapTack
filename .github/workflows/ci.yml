name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 同じブランチで新しい push があったら古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # WPF のビルドには Windows ランナーが必須
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SnapTack.slnx

      # Directory.Build.props により、CI では警告がエラー扱いになる
      - name: Build (Release)
        run: dotnet build SnapTack.slnx -c Release --no-restore

      - name: Test
        run: dotnet test SnapTack.slnx -c Release --no-build --verbosity normal
