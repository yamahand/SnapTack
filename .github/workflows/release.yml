name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'バージョン (例: 1.4.0)'
        required: true
        type: string

permissions:
  contents: write  # Release の作成に必要

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # タグ名 (v1.4.0) または手動入力からバージョン (1.4.0) を決定する
      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ inputs.version }}'
          } else {
            $version = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "バージョンの書式が不正です: '$version' (期待する形式: 1.4.0)"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      # ポータブル版 2 種 (ランタイム同梱 / 軽量) を artifacts へ出力する
      - name: Publish portable builds
        shell: pwsh
        run: ./scripts/publish.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # publish.ps1 が出力した artifacts/publish (同梱版) を取り込む
      - name: Build installer
        shell: pwsh
        run: |
          # choco 版はマシン全体 (Program Files) へ入るが、インストーラの仕様変更で
          # 位置が変わっても切り分けできるよう、候補を順に探して明示的に失敗させる
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Host "::error::ISCC.exe が見つかりません。探索したパス:"
            $candidates | ForEach-Object { Write-Host "::error::  $_" }
            exit 1
          }
          Write-Host "ISCC: $iscc"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" installer\SnapTack.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: List artifacts
        shell: pwsh
        run: Get-ChildItem artifacts -File | Select-Object Name, Length

      # ドラフトとして作成する。内容を確認しリリースノートを書いてから手動で公開する
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*setup.exe
